# Path → area-label rules for pull requests, consumed by actions/labeler@v5
# (see .github/workflows/labeler.yml). A PR gets an `area:*` label for every
# subsystem it touches. Keep the globs in sync with the repo layout.

"area:kernels":
  - changed-files:
      - any-glob-to-any-file: "kernels/**"

"area:runtime":
  - changed-files:
      - any-glob-to-any-file: "runtime/**"

"area:eval":
  - changed-files:
      - any-glob-to-any-file: "eval/**"

"area:tests":
  - changed-files:
      - any-glob-to-any-file:
          - "tests/**"
          - "**/tests/**"
          - "**/test_*.cpp"

"area:examples":
  - changed-files:
      - any-glob-to-any-file: "examples/**"

"area:docs":
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.md"
          - "LICENSE"

"area:ci":
  - changed-files:
      - any-glob-to-any-file: ".github/**"
