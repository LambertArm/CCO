name: GPU Eval

on:
  workflow_dispatch:
  pull_request:
    types: [labeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  gpu-eval:
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'run-gpu-eval'
    runs-on: [self-hosted, gpu]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run GPU eval
        run: python3 eval/run_eval_gpu.py --report-path eval/reports/gpu-ci.json --markdown-path eval/reports/gpu-ci.md

      - name: Upload GPU eval artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cco-gpu-eval-report
          path: |
            eval/reports/gpu-ci.json
            eval/reports/gpu-ci.md
