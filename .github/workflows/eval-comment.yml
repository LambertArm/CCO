name: Eval Comment

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  comment:
    runs-on: [self-hosted, gpu]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run eval
        run: python3 eval/run_eval_gpu.py --report-path eval/reports/pr.json --markdown-path eval/reports/pr.md

      - name: Comment eval summary
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const body = fs.readFileSync("eval/reports/pr.md", "utf8");
            const issue_number = context.payload.pull_request.number;
            const { owner, repo } = context.repo;
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: `## CCO Eval Bot\n\n${body}`
            });
