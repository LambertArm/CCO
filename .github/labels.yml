# CCO label taxonomy — the single source of truth for repository labels.
#
# `labels-sync.yml` reads this file and reconciles the repo's labels with it
# (create missing, recolor/redescribe drifted). Edit here, not in the GitHub UI.
#
# Three families:
#   area:*   subsystem the issue/PR touches (auto-applied from changed paths)
#   type:*   what kind of contribution it is (auto-applied from title/template)
#   status:* review/triage state (applied by maintainers or the eval bot)

# ── area: subsystems ────────────────────────────────────────────────────────
- name: "area:kernels"
  color: "8250DF"
  description: "CUDA kernels, GEMM paths, and matrix transform implementations"
- name: "area:runtime"
  color: "006B75"
  description: "Pipeline flow, CPU references, and host-side orchestration"
- name: "area:eval"
  color: "0052CC"
  description: "Evaluation scripts, thresholds, and report generation"
- name: "area:tests"
  color: "C2E0C6"
  description: "Correctness gates and test suites (tests/)"
- name: "area:examples"
  color: "BFD4F2"
  description: "Runnable examples (examples/)"
- name: "area:docs"
  color: "0E8A16"
  description: "README and other repository documentation"
- name: "area:ci"
  color: "5319E7"
  description: "GitHub Actions and repository automation (.github/)"

# ── type: contribution kind ─────────────────────────────────────────────────
- name: "type:transform"
  color: "D4C5F9"
  description: "New matrix transform proposal or transform refinement"
- name: "type:bug"
  color: "B60205"
  description: "Something is incorrect or broken"
- name: "type:enhancement"
  color: "1D76DB"
  description: "Improvement to an existing component"
- name: "type:docs"
  color: "FBCA04"
  description: "Documentation-only change"
- name: "type:question"
  color: "D876E3"
  description: "A question or discussion, not a change"

# ── status: triage / review state ───────────────────────────────────────────
- name: "status:needs-scorecard"
  color: "E99695"
  description: "PR is missing the reproducible eval scorecard"
- name: "status:needs-review"
  color: "FBCA04"
  description: "Awaiting maintainer review"
- name: "status:triage"
  color: "C5DEF5"
  description: "Newly opened, not yet triaged"
- name: "status:precheck-failed"
  color: "B60205"
  description: "CPU-only precheck failed and the PR was auto-closed"
- name: "status:gpu-queued"
  color: "FBCA04"
  description: "Passed CPU precheck and is waiting in the GPU eval queue"
- name: "status:gpu-running"
  color: "5319E7"
  description: "Currently being processed by the GPU eval queue worker"
- name: "status:gpu-passed"
  color: "0E8A16"
  description: "Real GPU eval passed"
- name: "status:gpu-failed"
  color: "D93F0B"
  description: "Real GPU eval failed"
